<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yemot Hamashiach TTS Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tinos:wght@400;700&family=Rubik:wght@300;400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f19;
    --surface: rgba(17, 24, 39, 0.7);
    --surface-neon: rgba(37, 99, 235, 0.1);
    --border: rgba(255, 255, 255, 0.08);
    --border-glow: #3b82f6;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --neon-blue: #00f2fe;
    --neon-purple: #4facfe;
    --neon-green: #00ff87;
    --neon-red: #ff416c;
    --radius: 20px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Rubik', sans-serif;
    background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
    padding: 4rem 1rem;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .container {
    max-width: 650px;
    margin: 0 auto;
    position: relative;
  }

  /* אפקט זוהר ברקע */
  .container::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 300px;
    background: var(--neon-blue);
    filter: blur(150px);
    opacity: 0.2;
    z-index: -1;
  }

  header {
    margin-bottom: 3.5rem;
    text-align: center;
  }

  header h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
  }

  header p {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: border-color 0.3s;
  }

  .card:focus-within {
    border-color: rgba(0, 242, 254, 0.4);
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 1.5rem;
  }

  @media (max-width: 540px) {
    .fields { grid-template-columns: 1fr; }
  }

  .field {
    display: flex;
    flex-direction: column;
  }

  .field-full {
    grid-column: 1 / -1;
    margin-top: 6px;
  }

  .field label {
    font-size: 13px;
    font-weight: 500;
    color: var(--neon-blue);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input, .field textarea {
    width: 100%;
    padding: 14px 18px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: #fff;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .field input[type="text"], .field input[type="password"] {
    direction: ltr;
    text-align: left;
  }

  .field textarea {
    min-height: 140px;
    resize: vertical;
    direction: rtl;
    text-align: right;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--border-glow);
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
  }

  .btn {
    width: 100%;
    padding: 15px 30px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
    color: #000;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 2rem;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
    color: #fff;
  }
  
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .status-msg {
    margin-top: 1.5rem;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .status-msg.success {
    display: block;
    background: rgba(0, 255, 135, 0.1);
    border: 1px solid var(--neon-green);
    color: var(--neon-green);
    text-shadow: 0 0 10px rgba(0, 255, 135, 0.2);
  }

  .status-msg.error {
    display: block;
    background: rgba(255, 65, 108, 0.1);
    border: 1px solid var(--neon-red);
    color: var(--neon-red);
    text-shadow: 0 0 10px rgba(255, 65, 108, 0.2);
  }

  .status-msg.info {
    display: block;
    background: var(--surface-neon);
    border: 1px solid var(--border-glow);
    color: #fff;
  }

  footer {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }

  footer strong {
    color: #fff;
    font-size: 14px;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
  }

  .footer-links {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  footer a {
    color: var(--text-muted);
    text-decoration: none;
    padding: 6px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 30px;
    transition: all 0.2s;
  }

  footer a:hover {
    color: var(--neon-blue);
    border-color: var(--neon-blue);
    background: rgba(0, 242, 254, 0.05);
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.15);
  }

  footer span { color: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>YEMOT HAMASHIACH TTS GENERATOR</h1>
    <p>סריקה אוטומטית והעלאת קבצי הקראה ממוספרים ללא קידומת (מצב מתקדם)</p>
  </header>

  <div class="card">
    <div class="fields">
      <div class="field">
        <label>מספר מערכת</label>
        <input type="text" id="sys-num" placeholder="077777" required />
      </div>
      <div class="field">
        <label>סיסמת ניהול</label>
        <input type="password" id="sys-pass" placeholder="••••••••" required />
      </div>
      <div class="field field-full">
        <label>נתיב שלוחה מטרה</label>
        <input type="text" id="target-path" value="/" placeholder="/" required />
      </div>
      <div class="field field-full">
        <label>טקסט להקראה קולית (TTS)</label>
        <textarea id="file-text" placeholder="הקלד כאן את התוכן שהמערכת תקריא למחייגים..." required></textarea>
      </div>
    </div>

    <button class="btn" id="upload-btn" onclick="uploadHighestTtsSmart()">
      <svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
      סרוק שלוחה ושגר קובץ TTS
    </button>

    <div class="status-msg" id="status-box"></div>
  </div>

  <footer>
    <div>פותח ועוצב ע"י <strong>אריה AI</strong></div>
    <div class="footer-links">
      <a href="https://mitmachim.top/user/%D7%90%D7%A8%D7%99%D7%94-ai" target="_blank">פרופיל במתמחים טופ</a>
      <span>•</span>
      <a href="https://f2.freeivr.co.il/user/%D7%90%D7%A8%D7%99%D7%94-ai" target="_blank">פורום ימות המשיח</a>
      <span>•</span>
      <a href="https://mail.google.com/mail/u/0/?fs=1&to=a0733641352@gmail.com&su=&tf=cm" target="_blank">📧 פנייה ישירה ב-Gmail</a>
    </div>
  </footer>
</div>

<script>
function showStatus(text, type) {
  const box = document.getElementById('status-box');
  box.textContent = text;
  box.className = 'status-msg ' + type;
}

async function uploadHighestTtsSmart() {
  const num = document.getElementById('sys-num').value.trim();
  const pass = document.getElementById('sys-pass').value.trim();
  let path = document.getElementById('target-path').value.trim();
  const fileText = document.getElementById('file-text').value.trim();

  if (!num || !pass || !path || !fileText) {
    showStatus('נא למלא את כל השדות בשלוחה ולהקליד טקסט להקראה.', 'error');
    return;
  }

  if (!path.startsWith('/')) path = '/' + path;
  if (path.endsWith('/') && path !== '/') path = path.slice(0, -1);
  
  const token = num + ':' + pass;
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;

  showStatus('מנתח את מבנה הקבצים בשלוחה הנוכחית...', 'info');

  let nextFileName = '1.tts';

  try {
    const dirUrl = `https://www.call2all.co.il/ym/api/GetIVR2Dir?token=${encodeURIComponent(token)}&path=${encodeURIComponent(path)}`;
    const dirResponse = await fetch(dirUrl);
    if (!dirResponse.ok) throw new Error('שגיאת רשת מול שרתי ימות המשיח');
    
    const dirData = await dirResponse.json();
    
    if (dirData.responseStatus === 'ERROR' || dirData.responseStatus === 'EXCEPTION') {
      throw new Error(dirData.message || 'פרטי זיהוי שגויים או שאין גישה לשלוחה המבוקשת');
    }

    let maxNumber = -1;
    const files = Array.isArray(dirData.files) ? dirData.files : [];

    files.forEach(f => {
      const match = f.name.match(/^(\d+)\.[a-zA-Z0-9]+$/);
      if (match) {
        const numVal = parseInt(match[1], 10);
        if (numVal > maxNumber) {
          maxNumber = numVal;
        }
      }
    });

    if (maxNumber !== -1) {
      maxNumber = maxNumber + 1;
      nextFileName = maxNumber + '.tts';
    }

    showStatus(`זוהה רצף קבצים. משגר קובץ חדש בשם: ${nextFileName}...`, 'info');

    const fullPath = 'ivr2:' + (path === '/' ? '' : path) + '/' + nextFileName;
    const formData = new URLSearchParams();
    formData.append('token', token);
    formData.append('what', fullPath);
    formData.append('contents', fileText);

    const uploadResponse = await fetch('https://www.call2all.co.il/ym/api/UploadTextFile', {
      method: 'POST',
      body: formData
    });

    if (!uploadResponse.ok) throw new Error('העלאת הקובץ נכשלה (שגיאת שרת)');

    const uploadData = await uploadResponse.json();

    if (uploadData.responseStatus === 'OK') {
      showStatus(`✓ ההעלאה הושלמה! הקובץ שוגר בהצלחה תחת השם: ${nextFileName}`, 'success');
    } else {
      showStatus('שגיאה מצד ה-API: ' + (uploadData.message || 'לא ידוע'), 'error');
    }

  } catch (error) {
    showStatus('שיבוש בתהליך: ' + error.message, 'error');
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
